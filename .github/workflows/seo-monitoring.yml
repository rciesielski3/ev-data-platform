name: SEO Monitoring

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    name: SEO Audit Check

    steps:
      - name: Verify robots.txt exists
        run: |
          curl -s https://www.evdatasource.com/robots.txt | head -5 || echo "Note: robots.txt check (optional)"

      - name: Verify sitemap is accessible
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://www.evdatasource.com/sitemap.xml | grep -E "200|301" && echo "Sitemap accessible"

      - name: Check for crawl errors (informational)
        run: |
          echo "Monitoring enabled. Check Google Search Console for crawl error details."
