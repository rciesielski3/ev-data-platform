name: Import OpenEV vehicle data

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  import-openev:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm ci

      - run: npx prisma generate

      - run: npm run import:openev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
