name: Import EIPA charging stations

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  import-eipa:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx prisma generate

      - run: npm run import:eipa
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EIPA_EXPORT_KEY: ${{ secrets.EIPA_EXPORT_KEY }}
